name: Test Live Compliance Endpoints

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run live endpoint tests
        run: |
          python tests/test_live_compliance_endpoints.py
