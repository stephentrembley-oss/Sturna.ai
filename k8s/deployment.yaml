apiVersion: apps/v1
kind: Deployment
metadata:
  name: sturna-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sturna
  template:
    metadata:
      labels:
        app: sturna
    spec:
      containers:
      - name: api
        image: sturna-ai:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"